<!-- 1) HERO plein écran -->
<section class="hero">
  <div class="hero__overlay">
    <div class="hero__content">
      <div class="hero__logo">🎬 MovieApp</div>
      <h1>Bienvenue</h1>
      <p>Gère ta collection de films : ajouter, modifier, supprimer.</p>

      <div class="hero__actions">
        <button class="btn" (click)="scrollToContent()">Découvrir</button>
        <a class="btn btn-outline" routerLink="/movies">Voir les films</a>
      </div>
    </div>
  </div>
</section>

<!-- 2) Liste des films en GRILLE -->
<section id="home-content" class="home-content">
  <div class="container py-4">
    <h2 class="mb-3">À l'affiche</h2>

    <div class="row g-3">
      @for (movie of movies$ | async; track movie.id) {
      <div class="col-6 col-md-4 col-lg-3">
        <app-movie-card [movie]="movie"></app-movie-card>
      </div>
      }
    </div>

  </div>
</section>

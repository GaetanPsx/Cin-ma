

<div class="container py-5">

  <h1>FAQ</h1>

  <h5>Comment ajouter un film ?</h5>
  <p>Allez dans "Ajouter un film" et remplissez le formulaire.</p>

  <h5>Comment modifier un film ?</h5>
  <p>Dans la gestion des films, cliquez sur le bouton modifier.</p>


  <div class="mt-5 p-4 bg-light rounded text-center shadow-sm">
  <h3 class="mb-4">Avez-vous trouvé la réponse à votre question ?</h3>

  <div class="d-flex justify-content-center gap-3">
    <button
      type="button"
      class="btn btn-warning btn-lg"
      (click)="answer(true)"
    >
      Oui, merci
    </button>

    <button
      type="button"
      class="btn btn-outline-dark btn-lg"
      (click)="answer(false)"
    >
      Non
    </button>
  </div>

  <div class="mt-4" *ngIf="feedbackMessage">
    <p class="fw-semibold mb-0">{{ feedbackMessage }}</p>
  </div>
</div>

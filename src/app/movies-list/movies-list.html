<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="page-title"> Gestion des films</h1>
    <button class="btn btn-add" routerLink="/add-movie">
      <i class="bi bi-plus-lg me-2"></i>Nouveau film
    </button>
  </div>

  <div class="table-wrapper">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>#</th>
          <th>Titre</th>
          <th>Date</th>
          <th>Réalisateur</th>
          <th>Note</th>
          <th>Synopsis</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (movie of movies$ | async; track movie.id) {
          <tr>
            <td class="text-muted">{{ movie.id }}</td>
            <td class="fw-bold">{{ movie.title }}</td>
            <td>{{ movie.releaseDate | date:'dd/MM/yy' }}</td>
            <td>{{ movie.director }}</td>
            <td>
              <span class="badge-rate"> {{ movie.rate }}</span>
            </td>
            <td class="synopsis-cell">{{ movie.synopsis }}</td>
            <td>
              <div class="d-flex gap-2">
                <a
                  class="btn-action btn-edit"
                  [routerLink]="['/edit-movie', movie.id]"
                  title="Modifier"
                >
                  <i class="bi bi-pencil"></i>
                </a>
                <button
                  type="button"
                  class="btn-action btn-delete"
                  (click)="deleteMovie(movie.id!)"
                  title="Supprimer"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
